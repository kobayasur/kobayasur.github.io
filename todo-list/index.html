<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TODOアプリ</title>
<link rel="manifest" href="manifest.json">

<style>
  body {
    font-family: sans-serif;
    background-color: #f5f5f7;
    margin: 0;
    padding: 20px;
  }
  #app {
    max-width: 500px;
    margin: 0 auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  h1 { color: #333; text-align: center; }
  input {
    width: 70%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 16px; /* スマホでズームされないサイズ */
  }
  button {
    padding: 12px 20px;
    background-color: #4A90E2;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
  }
  ul { padding: 0; margin-top: 20px; }
  li {
    background: #fff;
    border-bottom: 1px solid #eee;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  li button {
    background-color: #ff5e5e;
    padding: 5px 10px;
    font-size: 12px;
  }
</style>

</head>
<body>
<div id="app">
  <h1>My Tasks</h1>
  <input type="text" id="taskInput" placeholder="新しいタスク...">
  <button onclick="addTask()">追加</button>
  <ul id="taskList"></ul>
</div>
<script>
  // サービスワーカーを登録するコード
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }

// 1. ページを開いた時に、保存されているデータを読み込む
window.onload = function() {
    const savedTasks = localStorage.getItem('myTodo');
    if (savedTasks) {
        tasks = JSON.parse(savedTasks);
        render();
    }
};

let tasks = [];

function addTask() {
    const input = document.getElementById('taskInput');
    if (input.value.trim() !== "") {
        tasks.push(input.value);
        
        // 2. データをブラウザに保存する
        saveData();
        
        render();
        input.value = "";
    }
}

function saveData() {
    // 配列を文字列に変換して保存
    localStorage.setItem('myTodo', JSON.stringify(tasks));
}

function render() {
    const taskList = document.getElementById('taskList');
    taskList.innerHTML = "";
    tasks.forEach((task, index) => {
        const li = document.createElement('li');
        li.textContent = task;
        
        const btn = document.createElement('button');
        btn.textContent = "削除";
        btn.onclick = function() {
            tasks.splice(index, 1);
            saveData(); // 削除した後も保存
            render();
        };
        
        li.appendChild(btn);
        taskList.appendChild(li);
    });
}
</script>
</body>
</html>
