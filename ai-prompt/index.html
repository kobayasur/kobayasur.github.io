<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Ollama PWA Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="data:application/json,{'name':'OllamaChat','short_name':'Chat','start_url':'.','display':'standalone'}">
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
    textarea { width: 100%; height: 100px; margin-bottom: 10px; }
    input { width: 100%; margin-bottom: 10px; padding: 5px; }
    #output { background: #f0f0f0; padding: 15px; border-radius: 5px; min-height: 50px; }
    .config { border-bottom: 1px solid #ccc; margin-bottom: 20px; padding-bottom: 10px; background: #fafafa; padding: 10px; border-radius: 5px; }
    label { font-weight: bold; font-size: 0.9em; }
    .system-area { height: 80px; font-size: 0.85em; }
  </style>
</head>
<body>

  <div class="config">
    <label>Ollama URL:</label>
    <input type="text" id="tunnelUrl" placeholder="https://xxx.trycloudflare.com" onchange="saveConfig()">
    
    <label>役割指示 (System Prompt):</label>
    <textarea id="systemPrompt" class="system-area" placeholder="あなたはプロンプト専門家です..." onchange="saveConfig()"></textarea>
    <small>※URLと役割は自動で保存されます</small>
  </div>

  <h2>Ollama Chat</h2>
  <textarea id="prompt" placeholder="お題を入力..."></textarea>
  <button onclick="chat()" id="sendBtn">送信</button>

  <div id="output" style="white-space: pre-wrap; margin-top: 20px;">ここに回答が表示されます</div>

  <script>
    // ページ読み込み時に保存された設定を復元
    window.onload = () => {
      document.getElementById('tunnelUrl').value = localStorage.getItem('OLLAMA_TUNNEL_URL') || "";
      document.getElementById('systemPrompt').value = localStorage.getItem('OLLAMA_SYSTEM_PROMPT') || "";
    };

    // 設定をLocalStorageに保存
    function saveConfig() {
      const url = document.getElementById('tunnelUrl').value.replace(/\/$/, "");
      const system = document.getElementById('systemPrompt').value;
      localStorage.setItem('OLLAMA_TUNNEL_URL', url);
      localStorage.setItem('OLLAMA_SYSTEM_PROMPT', system);
      console.log("設定を保存しました");
    }

    async function chat() {
      const promptField = document.getElementById('prompt');
      const output = document.getElementById('output');
      const tunnelUrl = document.getElementById('tunnelUrl').value;
      const systemPrompt = document.getElementById('systemPrompt').value;
      const sendBtn = document.getElementById('sendBtn');

      if (!tunnelUrl) { alert("URLを入力してください"); return; }

      const userMessage = promptField.value;
      // 役割指示とユーザー入力を合体
      const fullPrompt = systemPrompt ? `${systemPrompt}\n\nお題: ${userMessage}` : userMessage;

      output.innerText = "考え中...";
      sendBtn.disabled = true;

      // タイムアウト設定 (60秒)
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 60000);

      try {
        const response = await fetch(`${tunnelUrl}/api/generate`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          signal: controller.signal,
          body: JSON.stringify({
            model: "hf.co/mmnga/Llama-3.1-Swallow-8B-Instruct-v0.5-gguf",
            prompt: fullPrompt,
            stream: false
          })
        });

        clearTimeout(timeoutId);

        if (!response.ok) throw new Error(`HTTPエラー: ${response.status}`);

        const data = await response.json();
        output.innerText = data.response || "返答が空でした";
        
      } catch (e) {
        if (e.name === 'AbortError') {
          output.innerText = "エラー: 60秒経過しても応答がありません。PC側の負荷を確認してください。";
        } else {
          output.innerText = "エラーが発生しました:\n" + e.message;
        }
        console.error(e);
      } finally {
        sendBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
