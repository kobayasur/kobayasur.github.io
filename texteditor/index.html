<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA HTML Editor</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --text-color: #d4d4d4;
            --accent-color: #007acc;
            --toolbar-bg: #333;
        }
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        }
        .toolbar {
            background-color: var(--toolbar-bg);
            padding: 10px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 1px solid #444;
        }
        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:disabled {
            background-color: #555;
        }
        #file-name {
            margin-left: auto;
            font-size: 12px;
            align-self: center;
            color: #aaa;
        }
        #editor {
            flex-grow: 1;
            width: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            border: none;
            padding: 15px;
            font-size: 16px;
            line-height: 1.5;
            outline: none;
            resize: none;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <button onclick="openFile()">開く</button>
    <button id="save-btn" onclick="saveFile()" disabled>上書き保存</button>
    <button onclick="previewHtml()">プレビュー</button>
    <span id="file-name">ファイル未選択</span>
</div>

<textarea id="editor" placeholder="ここにHTMLを入力、またはファイルを開いてください..."></textarea>

<script>
    let fileHandle;
    const editor = document.getElementById('editor');
    const saveBtn = document.getElementById('save-btn');
    const fileNameDisplay = document.getElementById('file-name');

    // 1. ファイルを開く
    async function openFile() {
        try {
            // ファイルピッカーを表示
            [fileHandle] = await window.showOpenFilePicker({
                types: [{
                    description: 'HTML Files',
                    accept: { 'text/html': ['.html', '.htm'] },
                }],
            });

            const file = await fileHandle.getFile();
            const contents = await file.text();

            editor.value = contents;
            fileNameDisplay.textContent = file.name;
            saveBtn.disabled = false;
            
            // タイトルも更新
            document.title = "Editing: " + file.name;
        } catch (err) {
            console.error('キャンセルまたはエラー:', err);
        }
    }

    // 2. 上書き保存
    async function saveFile() {
        if (!fileHandle) return;

        try {
            // 書き込み権限を確認（ブラウザの確認ダイアログが出る）
            const options = { mode: 'readwrite' };
            if (await fileHandle.queryPermission(options) !== 'granted') {
                if (await fileHandle.requestPermission(options) !== 'granted') {
                    alert('書き込み権限が拒否されました');
                    return;
                }
            }

            // 書き込みストリームを作成
            const writable = await fileHandle.createWritable();
            await writable.write(editor.value);
            await writable.close();

            alert('保存完了しました');
        } catch (err) {
            console.error('保存失敗:', err);
            alert('保存に失敗しました: ' + err.message);
        }
    }

    // 3. プレビュー（別タブで実行）
    function previewHtml() {
        const content = editor.value;
        const blob = new Blob([content], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        window.open(url, '_blank');
    }

    // 変更検知（簡易的）
    editor.addEventListener('input', () => {
        if (fileHandle) {
            fileNameDisplay.textContent = "*" + fileHandle.name;
        }
    });
</script>

</body>
</html>
