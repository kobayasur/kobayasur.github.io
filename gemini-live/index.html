<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Gemini Live API Test</title>
</head>
<body>
    <h1>Gemini Live API テキスト➔音声テスト</h1>
    <button id="connectBtn">1. APIに接続</button><br><br>
    <input type="text" id="inputText" placeholder="話しかける内容を入力" disabled>
    <button id="sendBtn" disabled>2. 送信</button>
    <hr>
    <div id="status">ステータス: 未接続</div>
    <div id="log" style="white-space: pre-wrap; background: #eee; padding: 10px; height: 300px; overflow-y: scroll;"></div>

    <script>
        const API_KEY = 'AIzaSyAixefTc5VMNgaUi4nb-7jwP7eFUdVSkDk'; // ここにAPIキーを入力
        const MODEL = 'gemini-2.0-flash';
        
// v1alpha ではなく v1beta など、時期によってエンドポイントが変わる可能性があります
const URL = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidirectionalGenerateContent?key=${API_KEY}`;

        let socket = null;
        const logDiv = document.getElementById('log');
        const statusDiv = document.getElementById('status');

        function log(msg) {
            logDiv.innerText += msg + '\n';
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // 1. 接続ボタンの処理
        document.getElementById('connectBtn').onclick = () => {
            socket = new WebSocket(URL);

            socket.onopen = () => {
                statusDiv.innerText = 'ステータス: 接続完了 (Setup送信中...)';
                // 接続直後にセットアップメッセージを送信
                const setupMessage = {
                    setup: {
                        model: `models/${MODEL}`,
                        generation_config: { response_modalities: ["audio"] } // 音声で返してと頼む
                    }
                };
                socket.send(JSON.stringify(setupMessage));
            };

            socket.onmessage = (event) => {
                const response = JSON.parse(event.data);
                
                // セットアップ完了通知
                if (response.setup_complete) {
                    statusDiv.innerText = 'ステータス: 準備完了！送信してください';
                    document.getElementById('inputText').disabled = false;
                    document.getElementById('sendBtn').disabled = false;
                    log('--- System: Setup Complete ---');
                }

                // AIからの返答処理
                if (response.server_content?.model_turn?.parts) {
                    response.server_content.model_turn.parts.forEach(part => {
                        if (part.inline_data) {
                            log(`[音声データ受信] Size: ${part.inline_data.data.length} chars (Base64)`);
                            // ※ここではまだ再生せず、データが届いていることだけ確認します
                        }
                        if (part.text) {
                            log(`[AIテキスト]: ${part.text}`);
                        }
                    });
                }
            };

            socket.onerror = (e) => log('Error: ' + JSON.stringify(e));
            
            socket.onclose = (event) => {
    // 1006の場合、通常 reason は空ですが、wasClean が false になります
    console.error("WebSocket Close Details:", {
        code: event.code,
        reason: event.reason,
        wasClean: event.wasClean
    });
    
    if (event.code === 1006) {
        log("エラー 1006: ネットワーク接続に失敗しました。ローカルサーバー経由か、URL/APIキーが正しいか確認してください。");
    }
};
            
            
        };

        // 2. 送信ボタンの処理
        document.getElementById('sendBtn').onclick = () => {
            const text = document.getElementById('inputText').value;
            if (!text) return;

            const clientContent = {
                client_content: {
                    turns: [{
                        role: "user",
                        parts: [{ text: text }]
                    }],
                    turn_complete: true
                }
            };
            socket.send(JSON.stringify(clientContent));
            log(`[あなた]: ${text}`);
            document.getElementById('inputText').value = '';
        };
    </script>
</body>
</html>
