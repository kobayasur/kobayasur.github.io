<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Launcher & News Reader</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --news: #8e44ad; }
        body { font-family: sans-serif; background: #222; color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* メインコンテナ */
        .container { width: 100%; max-width: 450px; background: #333; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); box-sizing: border-box; margin-bottom: 20px; }
        h1 { font-size: 1.2rem; text-align: center; margin-top: 0; color: #eee; }
        
        select, input { width: 100%; padding: 12px; font-size: 1rem; border-radius: 8px; margin-bottom: 10px; border: none; box-sizing: border-box; background: #444; color: white; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
        .btn-news { background: var(--news); }
        .status { font-size: 0.8rem; color: #aaa; text-align: center; min-height: 1.2rem; margin-bottom: 10px; }

        /* ニュースカードのスタイル */
        #newsList { width: 100%; max-width: 450px; }
        .card { background: #444; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .card h3 { font-size: 1rem; margin: 0 0 10px 0; line-height: 1.4; color: #fff; }
        .card p { font-size: 0.85rem; color: #ccc; margin: 0 0 12px 0; line-height: 1.5; }
        .card .meta { font-size: 0.7rem; color: #888; display: flex; justify-content: space-between; margin-bottom: 8px; }
        .card a { display: inline-block; color: #3b82f6; text-decoration: none; font-size: 0.85rem; font-weight: bold; border: 1px solid #3b82f6; padding: 5px 10px; border-radius: 5px; }
        
        .loader { display: none; text-align: center; margin: 10px 0; }
        .add-zone { margin-top: 20px; border-top: 1px solid #555; padding-top: 15px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>PWA Launcher & News</h1>
        
<label style="font-size: 0.8rem; display: block; margin-bottom: 5px;">読み上げ音声を選択:</label>
<select id="voice-select"></select>
        <select id="pwa-select" onchange="stopNews()"></select>

        <div class="flex" style="display: flex; gap: 8px;">
            <button onclick="fetchAndReadNews()" class="btn-news">ニュースを取得・聴く</button>
            <button onclick="readAllNews()" class="btn-news" style="flex: 1; background: #e67e22;">全リスト連続再生</button>
            <button onclick="stopNews()" style="background:#555; width: 80px;">停止</button>
        </div>
        
        <div id="status" class="status"></div>
        <div id="loader" class="loader">取得中...</div>

        <div class="add-zone">
            <input type="text" id="newName" placeholder="アプリ名">
            <input type="url" id="newUrl" placeholder="RSS URL (xml等)">
            <button onclick="addPWA()" style="background: var(--success);">リストに追加</button>
        </div>
    </div>

    <div id="newsList"></div>

<audio id="dummy-audio" loop src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA="></audio>

    <script>
        const defaultPwas = [
            { name: "Google News", url: "https://news.google.com/rss?hl=ja&gl=JP&ceid=JP:ja" },
            { name: "PC Watch", url: "https://pc.watch.impress.co.jp/data/rss/1.0/pcw/feed.rdf" },
            { name: "Akiba PC Hotline", url: "https://akiba-pc.watch.impress.co.jp/data/rss/1.0/ah/feed.rdf" },
            { name: "ケータイ Watch", url: "https://k-tai.watch.impress.co.jp/data/rss/1.0/ktw/feed.rdf" },
            { name: "窓の杜", url: "https://forest.watch.impress.co.jp/data/rss/1.0/wf/feed.rdf" },
            { name: "読売新聞", url: "https://assets.wor.jp/rss/rdf/yomiuri/latestnews.rdf" },
            { name: "ギズモード", url: "https://www.gizmodo.jp/index.xml" }
        ];

        const synth = window.speechSynthesis;
        const status = document.getElementById('status');
        const newsList = document.getElementById('newsList');
        const loader = document.getElementById('loader');

// JSの冒頭で音量を設定（耳には聞こえないレベル）
    document.getElementById('dummy-audio').volume = 1.0;

            function renderNews(items) {
            newsList.innerHTML = items.map(item => {
                const date = new Date(item.pubDate).toLocaleString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                const description = item.description.replace(/<[^>]*>?/gm, '').substring(0, 80);
                return `
                    <div class="card">
                        <div class="meta"><span>${item.author || ''}</span><span>${date}</span></div>
                        <h3>${item.title}</h3>
                        <p>${description}...</p>
                        <a href="${item.link}" target="_blank">記事をブラウザで開く</a>
                    </div>
                `;
            }).join('');
        }

const voiceSelect = document.getElementById('voice-select');
let allVoices = [];

// --- 利用可能な音声をコンボボックスにセットする ---
function loadVoices() {
    allVoices = synth.getVoices();
    const jpVoices = allVoices.filter(v => v.lang.includes('ja'));

    if (jpVoices.length === 0) return;

    voiceSelect.innerHTML = jpVoices.map((v, i) => 
        `<option value="${v.name}">${v.name}</option>` // valueをインデックスではなく「名前」にします
    ).join('');
    
    // 1. 保存された音声名があるか確認
    const savedVoiceName = localStorage.getItem('selectedVoiceName');
    
    if (savedVoiceName) {
        // 保存された名前と一致するものを探して選択
        const savedIdx = jpVoices.findIndex(v => v.name === savedVoiceName);
        if (savedIdx !== -1) {
            voiceSelect.selectedIndex = savedIdx;
            return;
        }
    }

    // 2. 保存がない、または見つからない場合はデフォルトの優先順位
    const defaultIdx = jpVoices.findIndex(v => v.name.includes('Google') || v.name.includes('Kyoko') || v.name.includes('Nanami'));
    if (defaultIdx !== -1) voiceSelect.selectedIndex = defaultIdx;
}

// --- 選択された音声を保存する関数 ---
function saveVoice() {
    const selectedName = voiceSelect.value;
    if (selectedName) {
        localStorage.setItem('selectedVoiceName', selectedName);
        status.textContent = "音声を保存しました";
        setTimeout(() => { if(status.textContent === "音声を保存しました") status.textContent = ""; }, 2000);
    }
}

// セレクトボックスが変更されたら保存するイベントを追加
voiceSelect.onchange = saveVoice;

// 音声リストの準備完了イベント
speechSynthesis.onvoiceschanged = loadVoices;

// --- speak関数 (名前ベースで音声を選択するように変更) ---
function speak(text) {
    // 1. 再生が止まりそうなら即座に再開（これが心臓マッサージになります）
    if (dummyAudio.paused) {
        dummyAudio.play().catch(() => {});
    }

    const uttr = new SpeechSynthesisUtterance(text);
    const selectedName = voiceSelect.value;
    const voice = allVoices.find(v => v.name === selectedName);

    if (voice) uttr.voice = voice;
    uttr.lang = 'ja-JP';
    uttr.pitch = 1.0;
    uttr.rate = 0.95;

    // 2. 読み上げ中も MediaSession を "playing" に維持
    if ('mediaSession' in navigator) {
        navigator.mediaSession.playbackState = "playing";
    }

    synth.speak(uttr);
    return uttr; // uttrを返せるようにしておくと管理が楽です
}

        function pause(ms) {
            const uttr = new SpeechSynthesisUtterance("");
            uttr.volume = 0;
            synth.speak(uttr);
        }

        // --- リスト管理 ---
        function renderList() {
            const select = document.getElementById('pwa-select');
            const saved = JSON.parse(localStorage.getItem('myPwas') || '[]');
            select.innerHTML = [...defaultPwas, ...saved].map(p => `<option value="${p.url}">${p.name}</option>`).join('');
        }

        function addPWA() {
            const name = document.getElementById('newName').value;
            const url = document.getElementById('newUrl').value;
            if (!name || !url) return;
            const saved = JSON.parse(localStorage.getItem('myPwas') || '[]');
            saved.push({ name, url });
            localStorage.setItem('myPwas', JSON.stringify(saved));
            renderList();
        }

let isContinuousMode = false;
let currentNewsIndex = 0;

// --- 全リストを順番に読み上げる ---
async function readAllNews() {
    isContinuousMode = true;
    currentNewsIndex = 0;
    const select = document.getElementById('pwa-select');
    
    // 最初のニュースを開始
    select.selectedIndex = currentNewsIndex;
    await fetchAndReadNews();
}

const dummyAudio = document.getElementById('dummy-audio');
let wakeLock = null;

// --- fetchAndReadNews を少し修正（連続再生対応） ---
async function fetchAndReadNews() {

    // スリープ防止をリクエスト
    if ('wakeLock' in navigator) {
        try {
            //wakeLock = await navigator.wakeLock.request('screen');
        } catch (err) {
            console.log("WakeLock error:", err);
        }
    }
    
    // 1. 無音再生を開始
    try {
        await dummyAudio.play();
    } catch (e) {
        console.log("再生ブロック解除のためユーザー操作が必要です", e);
    }

    // 2. Media Session API でロック画面に情報を登録
    if ('mediaSession' in navigator) {
        const select = document.getElementById('pwa-select');
        const currentSiteName = select.options[select.selectedIndex].text;

        navigator.mediaSession.metadata = new MediaMetadata({
            title: 'ニュース連続読み上げ中',
            artist: currentSiteName,
            album: 'PWA News Reader',
            artwork: [
                { src: 'https://via.placeholder.com/512', sizes: '512x512', type: 'image/png' }
            ]
        });
        
    // 既存の Metadata 設定のあとに追加
    navigator.mediaSession.playbackState = "playing"; 

    // 「次の曲」ボタンで次のニュースサイトへスキップできるようにする（おまけ）
    navigator.mediaSession.setActionHandler('nexttrack', () => {
        onSourceFinished(); 
    });
    // 以下のハンドラを登録することで、OSに「制御可能なプレイヤー」だと認識させます
    navigator.mediaSession.setActionHandler('play', () => {
        dummyAudio.play();
        navigator.mediaSession.playbackState = "playing";
    });
    
        // ロック画面のボタン（再生・停止）とアプリの動作を紐付ける
        navigator.mediaSession.setActionHandler('pause', () => {
            stopNews();
        });
        navigator.mediaSession.setActionHandler('stop', () => {
            stopNews();
        });
    }

    const select = document.getElementById('pwa-select');
    const url = select.value;
    if (!url) return;

    stopNews();
    loader.style.display = 'block';
    newsList.innerHTML = '<h3>読み込み中...</h3>';
    status.textContent = `${select.options[select.selectedIndex].text} を取得中...`;

    try {
        const apiAddr = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`;
        const response = await fetch(apiAddr);
        const data = await response.json();
        
        if (data.status === 'ok') {
            renderNews(data.items);
            // 読み上げ開始（callbackとして次へ進む処理を渡す）
            startVoiceReport(data.feed.title, data.items, onSourceFinished);
            status.textContent = "読み上げ中...";
        } else {
            status.textContent = "取得エラー。次へ進みます。";
            if(isContinuousMode) onSourceFinished();
        }
    } catch (error) {
        status.textContent = "接続エラー";
        if(isContinuousMode) onSourceFinished();
    } finally {
        loader.style.display = 'none';
    }
}

// --- 1つのソースが終わった時の処理 ---
function onSourceFinished() {
    if (!isContinuousMode) return;

    const select = document.getElementById('pwa-select');
    currentNewsIndex++;

    if (currentNewsIndex < select.options.length) {
        select.selectedIndex = currentNewsIndex;
        // 休憩時間を短くし、OSが「暇だ」と判断する隙を与えない
        setTimeout(() => {
            fetchAndReadNews();
        }, 500); 
    } else {
        isContinuousMode = false;
        speak("全てのニュースを読み上げました。");
        status.textContent = "完了";
    }
}

function startVoiceReport(sourceName, items, callback) {
    const reportItems = items.slice(0, 6); // 各サイト3件
    let currentItemIndex = -1; // -1はソース名の読み上げ用

    function readNext() {
        // 画面オフ対策：常にオーディオを再生状態に
        dummyAudio.play().catch(() => {});

        let text = "";
        if (currentItemIndex === -1) {
            text = `${sourceName}のニュースをお伝えします。`;
        } else if (currentItemIndex < reportItems.length) {
            const item = reportItems[currentItemIndex];
            text = `第${currentItemIndex + 1}。${item.title}。${item.description.replace(/<[^>]*>?/gm, '').split(/[。]/)[0]}。`;
        } else {
            // このサイトの全記事終了
            if (callback) callback();
            return;
        }

        const uttr = new SpeechSynthesisUtterance(text);
        
        // 音声設定の適用
        const selectedName = voiceSelect.value;
        const voice = allVoices.find(v => v.name === selectedName);
        if (voice) uttr.voice = voice;
        uttr.lang = 'ja-JP';
        uttr.rate = 0.95;

        // 読み終わったら「次の記事」を呼ぶ（これが重要！）
        uttr.onend = () => {
            currentItemIndex++;
            // 0.5秒の「溜め」を作ってから次へ（OSのスリープ割り込みを防ぐ）
            setTimeout(readNext, 1000);
        };

        synth.speak(uttr);
    }

    // 読み上げ開始
    readNext();
}

// stopNews も修正（連続モードを解除）
function stopNews() {
    isContinuousMode = false;
    synth.cancel();

    // オーディオを停止して巻き戻す
    dummyAudio.pause();
    dummyAudio.currentTime = 0;

    status.textContent = "";
}

// 初期化処理をまとめる
window.onload = () => {
    renderList();
    loadVoices(); // ページ読み込み時にも一度実行
};

    </script>
</body>
</html>
